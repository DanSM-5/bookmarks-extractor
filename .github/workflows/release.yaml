name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, windows, darwin]
        goarch: [amd64, arm64]
        exclude:
          - goos: darwin
            goarch: arm64 # Optional: Remove if you want macOS ARM support (requires M1 runner or cross-compile tweaks)
          - goos: windows
            goarch: arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          clean: true
          fetch-depth: 1

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Build Binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0 # Ensures static linking for portability
        run: |
          # Define binary name with extension for Windows
          BIN_NAME="bookmarks-${GOOS}-${GOARCH}"
          if [ "$GOOS" == "windows" ]; then
            BIN_NAME="${BIN_NAME}.exe"
          fi
          
          go build -v -o "${BIN_NAME}" -ldflags="-s -w" -trimpath ./cmd/bookmarks # Adjust path to your main.go

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bookmarks-${{ matrix.goos }}-${{ matrix.arch }}
          path: bookmarks-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goos == 'windows' && '.exe' || '' }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
